services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: pfe_keycloak
    command: start-dev --import-realm
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-sellynx.json:/opt/keycloak/data/import/realm-sellynx.json
    networks:
      - pfe_network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/realms/sellynx || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: pfe_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - pfe_network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: pfe_backend
    env_file:
      - ./env_files/backend.env
    ports:
      - "8000:8000"
    volumes:
      - ./pfe-backend:/app
    depends_on:
      elasticsearch:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - pfe_network

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: pfe_frontend
    env_file:
      - ./env_files/frontend.env
    ports:
      - "5173:5173"
    volumes:
      - ./pfe-frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - pfe_network

networks:
  pfe_network:
    driver: bridge

volumes:
  es_data:
    driver: local
